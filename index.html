<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Storm Chase HQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; background:#04091a; }
        body {
            font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
            color:#e8eef8;
            -webkit-font-smoothing:antialiased;
            overscroll-behavior:none;
            -webkit-tap-highlight-color:transparent;
        }
        #root { position:fixed; inset:0; z-index:10; }
        #map-mount { position:fixed; inset:0; z-index:1; }
        #map { width:100%; height:100%; }

        /* Deep blue map tint */
        .leaflet-tile-pane { filter:brightness(.72) saturate(1.3) hue-rotate(198deg); }
        .leaflet-control-zoom { display:none; }
        .leaflet-control-attribution {
            background:rgba(4,9,26,.6)!important; color:rgba(255,255,255,.25)!important;
            font-size:9px!important; border-radius:6px!important;
        }
        .leaflet-popup-content-wrapper {
            background:rgba(7,14,36,.96)!important; color:#e8eef8!important;
            border:1px solid rgba(100,148,255,.22)!important;
            border-radius:14px!important; backdrop-filter:blur(20px);
            box-shadow:0 8px 32px rgba(0,0,0,.5)!important;
        }
        .leaflet-popup-tip { background:rgba(7,14,36,.96)!important; }
        .leaflet-popup-close-button { color:#8896b8!important; }

        @keyframes pulseRing {
            0%   { transform:scale(1); opacity:.6; }
            100% { transform:scale(3.2); opacity:0; }
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity:0; } to { opacity:1; }
        }
        @keyframes shimmer {
            0%   { background-position:200% 0; }
            100% { background-position:-200% 0; }
        }
        @keyframes glowPulseRed {
            0%,100% { box-shadow:0 0 20px rgba(255,61,61,.25),0 0 0 1px rgba(255,61,61,.2); }
            50%      { box-shadow:0 0 40px rgba(255,61,61,.5),0 0 0 1px rgba(255,61,61,.4); }
        }
        @keyframes glowPulsePurple {
            0%,100% { box-shadow:0 0 20px rgba(191,90,242,.3); }
            50%      { box-shadow:0 0 50px rgba(191,90,242,.7); }
        }
        @keyframes float {
            0%,100% { transform:translateY(0); }
            50%      { transform:translateY(-6px); }
        }
        @keyframes scanline {
            from { background-position:0 0; }
            to   { background-position:0 100px; }
        }
        @keyframes lightning {
            0%,96%,100% { opacity:0; }
            97%          { opacity:.04; }
            98%          { opacity:0; }
            99%          { opacity:.06; }
        }
        @keyframes slideUp {
            from { transform:translateY(100%); }
            to   { transform:translateY(0); }
        }
        @keyframes refreshBlink {
            0%,100% { opacity:1; }
            50%      { opacity:.4; }
        }

        /* Scrollable panels */
        .panel-scroll {
            overflow-y:auto; overscroll-behavior:contain;
            -webkit-overflow-scrolling:touch;
        }
        .panel-scroll::-webkit-scrollbar { display:none; }

        /* Custom range slider */
        input[type=range] { -webkit-appearance:none; appearance:none; background:transparent; width:100%; cursor:pointer; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance:none;
            width:22px; height:22px; border-radius:50%;
            background:#4d94ff;
            margin-top:-9px;
            border:3px solid rgba(255,255,255,.9);
            box-shadow:0 0 14px rgba(77,148,255,.8);
        }
        input[type=range]::-webkit-slider-runnable-track {
            height:4px; border-radius:2px;
        }

        /* Glass morphism utility */
        .glass {
            background:rgba(4,9,26,.86);
            backdrop-filter:blur(24px);
            -webkit-backdrop-filter:blur(24px);
            border:1px solid rgba(100,148,255,.14);
        }

        /* Particle canvas */
        #atmos-canvas {
            position:fixed; inset:0; z-index:2;
            pointer-events:none;
            opacity:.6;
        }
    </style>
</head>
<body>
<canvas id="atmos-canvas"></canvas>
<div id="map-mount"><div id="map"></div></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const PRIORITY = {
    'Tornado Emergency':5,'Tornado Warning':4,'Tornado Watch':3,
    'Severe Thunderstorm Warning':2,'Severe Thunderstorm Watch':1
};
const ALERT_COLOR = {
    'Tornado Emergency':'#bf5af2','Tornado Warning':'#ff3d3d',
    'Tornado Watch':'#ff9500','Severe Thunderstorm Warning':'#ffd60a',
    'Severe Thunderstorm Watch':'#a8e063'
};
const ALERT_TAG = {
    'Tornado Emergency':{ label:'TORNADO EMERGENCY', bg:'rgba(191,90,242,.2)', color:'#bf5af2' },
    'Tornado Warning':  { label:'TORNADO WARNING',   bg:'rgba(255,61,61,.18)', color:'#ff3d3d' },
    'Tornado Watch':    { label:'TORNADO WATCH',     bg:'rgba(255,149,0,.18)', color:'#ff9500' },
    'Severe Thunderstorm Warning': { label:'SVR TSTM WARN', bg:'rgba(255,214,10,.15)', color:'#ffd60a' },
    'Severe Thunderstorm Watch':   { label:'SVR TSTM WATCH',bg:'rgba(168,224,99,.12)', color:'#a8e063' },
};
const LEVEL_CFG = {
    emergency:{ color:'#bf5af2', glow:'rgba(191,90,242,.5)', label:'TORNADO EMERGENCY', icon:'⚡', bg:'linear-gradient(180deg,rgba(40,0,80,.9) 0%,rgba(4,9,26,.0) 60%)' },
    warning:  { color:'#ff3d3d', glow:'rgba(255,61,61,.5)',  label:'TORNADO WARNING',   icon:'🌪️',bg:'linear-gradient(180deg,rgba(80,0,0,.9) 0%,rgba(4,9,26,.0) 60%)' },
    watch:    { color:'#ff9500', glow:'rgba(255,149,0,.4)',  label:'TORNADO WATCH',     icon:'⚠️',bg:'linear-gradient(180deg,rgba(50,25,0,.9) 0%,rgba(4,9,26,.0) 60%)' },
    advisory: { color:'#ffd60a', glow:'rgba(255,214,10,.3)', label:'ADVISORY',          icon:'⛈️',bg:'linear-gradient(180deg,rgba(40,35,0,.9) 0%,rgba(4,9,26,.0) 60%)' },
    clear:    { color:'#30d158', glow:'rgba(48,209,88,.3)',  label:'ALL CLEAR',         icon:'✅',bg:'linear-gradient(180deg,rgba(0,25,10,.8) 0%,rgba(4,9,26,.0) 60%)' },
};
const STATE_NAMES = {
    'AL':'Alabama','AR':'Arkansas','CO':'Colorado','GA':'Georgia','IA':'Iowa',
    'IL':'Illinois','IN':'Indiana','KS':'Kansas','KY':'Kentucky','LA':'Louisiana',
    'MI':'Michigan','MN':'Minnesota','MO':'Missouri','MS':'Mississippi',
    'NE':'Nebraska','NM':'New Mexico','ND':'North Dakota','OH':'Ohio',
    'OK':'Oklahoma','SD':'South Dakota','TN':'Tennessee','TX':'Texas',
    'WI':'Wisconsin','WY':'Wyoming'
};

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function haversine(lat1,lon1,lat2,lon2){
    const R=3958.8,dL=(lat2-lat1)*Math.PI/180,dO=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dO/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function centroid(geom){
    if(!geom)return null;
    if(geom.type==='Point')return{lat:geom.coordinates[1],lon:geom.coordinates[0]};
    const pts=geom.type==='Polygon'?geom.coordinates[0]:geom.coordinates[0][0];
    if(!pts?.length)return null;
    return{lat:pts.reduce((s,c)=>s+c[1],0)/pts.length,lon:pts.reduce((s,c)=>s+c[0],0)/pts.length};
}
function bearingDir(lat1,lon1,lat2,lon2){
    const dO=(lon2-lon1)*Math.PI/180,y=Math.sin(dO)*Math.cos(lat2*Math.PI/180);
    const x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dO);
    return['N','NE','E','SE','S','SW','W','NW'][Math.round(((Math.atan2(y,x)*180/Math.PI+360)%360)/45)%8];
}
function windDirStr(d){return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];}
function wmoIcon(c){if(c===0)return'☀️';if(c<=2)return'⛅';if(c<=3)return'☁️';if(c<=49)return'🌫️';if(c<=59)return'🌦️';if(c<=69)return'🌨️';if(c<=79)return'❄️';if(c<=84)return'🌧️';return'⛈️';}
function dewpt(tF,rh){const tC=(tF-32)*5/9,a=17.27,b=237.7,g=(a*tC/(b+tC))+Math.log(rh/100);return Math.round(b*g/(a-g)*9/5+32);}
function statesForLoc(lat,lon){
    if(lat>43)return'MN,WI,IA,SD,ND,MI,IL';
    if(lat>41&&lon<-95)return'NE,IA,SD,KS,MN,MO,WI';
    if(lat>41&&lon>=-95)return'IL,WI,IN,MI,OH,IA,MO';
    if(lat>38&&lon<-93)return'KS,MO,NE,IA,OK,CO,IL';
    if(lat>38&&lon>=-93)return'MO,IL,KY,IN,TN,AR,IA';
    if(lat>35&&lon<-95)return'OK,KS,MO,AR,TX,CO,NM';
    if(lat>35&&lon>=-95)return'TN,KY,AR,MO,AL,MS,GA';
    if(lat<35&&lon<-95)return'TX,OK,NM,AR,LA,KS';
    return'AL,AR,GA,IL,KS,KY,LA,MO,MS,OK,TN,TX';
}
function relTime(s){
    const d=new Date(s),m=Math.floor((Date.now()-d)/60000);
    if(isNaN(m)||m<0)return'';
    if(m<1)return'just now';if(m<60)return`${m}m ago`;
    const h=Math.floor(m/60);if(h<24)return`${h}h ago`;
    return`${Math.floor(h/24)}d ago`;
}
function stripHtml(h){const d=document.createElement('div');d.innerHTML=h;return(d.textContent||d.innerText||'').replace(/\s+/g,' ').trim();}
function getChaseRating(cape){
    if(cape>=3000)return{label:'EXTREME',sub:'Exceptional instability — prime chase day',color:'#ff3d3d',icon:'🌪️',gradient:'linear-gradient(135deg,#3d0000,#7a0000)'};
    if(cape>=2000)return{label:'HIGH',   sub:'Strong instability — good chase potential', color:'#ff9500',icon:'⛈️',gradient:'linear-gradient(135deg,#2d1500,#5a3000)'};
    if(cape>=1000)return{label:'MODERATE',sub:'Moderate instability — watch closely',     color:'#ffd60a',icon:'🌩️',gradient:'linear-gradient(135deg,#2a2500,#4a4200)'};
    if(cape>=500) return{label:'LOW',    sub:'Limited storm potential today',              color:'#30d158',icon:'⛅',gradient:'linear-gradient(135deg,#002515,#004028)'};
    return{label:'MINIMAL',sub:'Very low instability — not a chase day',color:'#8896b8',icon:'☀️',gradient:'linear-gradient(135deg,#08122a,#0c1a38)'};
}

// ─────────────────────────────────────────────
// ATMOSPHERE PARTICLES
// ─────────────────────────────────────────────
function initAtmosphere(){
    const canvas=document.getElementById('atmos-canvas');
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    let W,H,particles=[];
    function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;particles=Array.from({length:60},()=>mkPart());}
    function mkPart(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:-.1-Math.random()*.4,r:Math.random()*1.2+.2,o:Math.random()*.4+.05};}
    function draw(){
        ctx.clearRect(0,0,W,H);
        particles.forEach(p=>{
            ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(100,160,255,${p.o})`;ctx.fill();
            p.x+=p.vx;p.y+=p.vy;
            if(p.y<-2||p.x<-2||p.x>W+2){Object.assign(p,mkPart());p.y=H+2;}
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize',resize);resize();draw();
}

// ─────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────
function App(){
    const [tab,setTab]         = useState('map');
    const [prevTab,setPrevTab] = useState(null);
    const [loc,setLoc]         = useState({lat:38.7881,lon:-90.4974});
    const [locName,setLocName] = useState('St. Charles, MO');
    const [locReady,setLocReady]= useState(false);
    const [conditions,setConditions] = useState(null);
    const [alerts,setAlerts]   = useState([]);
    const [hourly,setHourly]   = useState([]);
    const [radarFrames,setRadarFrames] = useState([]);
    const [radarIdx,setRadarIdx]       = useState(0);
    const [chaseDay,setChaseDay]       = useState(null);
    const [alertLevel,setAlertLevel]   = useState('clear');
    const [time,setTime]       = useState(new Date());
    const [lastUpdated,setLastUpdated] = useState(null);
    const [refreshPulse,setRefreshPulse] = useState(false);
    const [mapStyle,setMapStyle]       = useState('street');
    const [darkMode,setDarkMode]       = useState(true);
    const [showSettings,setShowSettings] = useState(false);
    const [radarPlaying,setRadarPlaying] = useState(false);
    const [settings,setSettings] = useState({
        notificationsEnabled: false,
        soundEnabled: false,
        alertTypes: ['Tornado Emergency','Tornado Warning','Tornado Watch','Severe Thunderstorm Warning'],
        alertRadius: 200
    });
    const [maxVTweets,setMaxVTweets] = useState([]);
    const [maxVLoading,setMaxVLoading] = useState(false);
    const [maxVError,setMaxVError]   = useState(null);

    useEffect(()=>{initAtmosphere();},[]);

    // Clock
    useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);

    // Geolocation — watch continuously while driving
    useEffect(()=>{
        if(!navigator.geolocation){setLocReady(true);return;}
        let firstFix=true;
        const wid=navigator.geolocation.watchPosition(
            async pos=>{
                const nl={lat:pos.coords.latitude,lon:pos.coords.longitude};
                setLoc(nl);
                if(firstFix){
                    firstFix=false;
                    try{
                        const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${nl.lat}&lon=${nl.lon}`,{headers:{'Accept-Language':'en'}});
                        const g=await r.json();
                        const city=g.address?.city||g.address?.town||g.address?.county||'Your Location';
                        const st=g.address?.ISO3166_2_lvl4?.split('-')[1]||g.address?.state?.slice(0,2).toUpperCase()||'';
                        setLocName(city+(st?`, ${st}`:''));
                    }catch(_){}
                    setLocReady(true);
                }
                // Auto-pan map to new position while driving
                if(window._leafletMap) window._leafletMap.panTo([nl.lat,nl.lon],{animate:true,duration:1});
            },
            ()=>setLocReady(true),
            {enableHighAccuracy:true,timeout:9000,maximumAge:10000}
        );
        return()=>navigator.geolocation.clearWatch(wid);
    },[]);

    // Data fetching
    useEffect(()=>{
        if(!locReady)return;
        fetchAlerts(loc);
        fetchConditions(loc);
        fetchRadar();
        fetchMaxVelocityFeed(loc,locName);
        // Auto-refresh NWS every 2 minutes, MaxVelocity feed every 5 minutes
        const t=setInterval(()=>fetchAlerts(loc),120000);
        const tf=setInterval(()=>fetchMaxVelocityFeed(loc,locName),300000);
        return()=>{clearInterval(t);clearInterval(tf);};
    },[locReady]);

    async function fetchAlerts(l){
        try{
            const res=await fetch(`https://api.weather.gov/alerts/active?area=${statesForLoc(l.lat,l.lon)}&status=actual`,
                {headers:{'User-Agent':'StormChaseHQ/3.0 (jed.a.west@gmail.com)'}});
            const data=await res.json();
            const arr=[];
            for(const feat of(data.features||[])){
                const p=feat.properties;
                if(!PRIORITY[p.event])continue;
                const c=centroid(feat.geometry);
                if(!c)continue;
                const dist=haversine(l.lat,l.lon,c.lat,c.lon);
                if(dist>200)continue;
                arr.push({id:feat.id||p.id,event:p.event,area:p.areaDesc,headline:p.headline||p.event,
                    description:p.description||'',dist:Math.round(dist),
                    dir:bearingDir(l.lat,l.lon,c.lat,c.lon),
                    expires:p.expires,c,priority:PRIORITY[p.event]||0,geometry:feat.geometry});
            }
            arr.sort((a,b)=>b.priority-a.priority||a.dist-b.dist);
            setAlerts(arr);
            const top=arr[0];
            if(!top)setAlertLevel('clear');
            else if(top.event==='Tornado Emergency')setAlertLevel('emergency');
            else if(top.event==='Tornado Warning')setAlertLevel('warning');
            else if(top.event==='Tornado Watch'||top.event==='Severe Thunderstorm Warning')setAlertLevel('watch');
            else setAlertLevel('advisory');
            setLastUpdated(new Date());
            setRefreshPulse(true);
            setTimeout(()=>setRefreshPulse(false),2000);
        }catch(e){console.error(e);}
    }

    async function fetchConditions(l){
        try{
            const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${l.lat}&longitude=${l.lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,wind_gusts_10m,surface_pressure,weathercode&hourly=temperature_2m,precipitation_probability,weathercode,cape&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=1&timezone=auto`);
            const d=await r.json();
            const c=d.current;
            setConditions({
                temp:Math.round(c.temperature_2m),feels:Math.round(c.apparent_temperature),
                wind:Math.round(c.wind_speed_10m),windDir:windDirStr(c.wind_direction_10m),
                gust:Math.round(c.wind_gusts_10m),humidity:c.relative_humidity_2m,
                pressure:Math.round(c.surface_pressure),dew:dewpt(c.temperature_2m,c.relative_humidity_2m),
                code:c.weathercode
            });
            const nowH=new Date().getHours();
            const hrs=[];
            for(let i=nowH;i<Math.min(nowH+12,d.hourly.time.length);i++){
                const cape=d.hourly.cape?.[i]||0;
                hrs.push({time:new Date(d.hourly.time[i]).toLocaleTimeString([],{hour:'numeric'}),
                    icon:wmoIcon(d.hourly.weathercode[i]),temp:Math.round(d.hourly.temperature_2m[i]),
                    pop:d.hourly.precipitation_probability[i]||0,cape});
            }
            setHourly(hrs);
            const maxCape=Math.max(...(d.hourly.cape||[0]));
            setChaseDay(getChaseRating(maxCape));
        }catch(e){console.error(e);}
    }

    async function fetchMaxVelocityFeed(l, name){
        setMaxVLoading(true); setMaxVError(null);
        try{
            const st = name.includes(',') ? name.split(',').pop().trim() : '';
            const nearby = statesForLoc(l.lat,l.lon).split(',').map(s=>s.trim());
            const nearbyFull = nearby.map(c=>STATE_NAMES[c]).filter(Boolean);
            const rssUrl = 'https://rsshub.app/twitter/user/MaxVelocityWX';
            const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`;
            const controller = new AbortController();
            const timer = setTimeout(()=>controller.abort(), 9000);
            const r = await fetch(proxy, {signal:controller.signal});
            clearTimeout(timer);
            if(!r.ok) throw new Error('fetch failed');
            const txt = await r.text();
            const xml = new DOMParser().parseFromString(txt,'text/xml');
            const items = Array.from(xml.querySelectorAll('item'));
            if(!items.length) throw new Error('empty feed');
            const tweets = items.slice(0,30).map(item=>{
                const rawDesc = item.querySelector('description')?.textContent||'';
                const text = stripHtml(rawDesc) || item.querySelector('title')?.textContent||'';
                const link = item.querySelector('link')?.textContent||'#';
                const pubDate = item.querySelector('pubDate')?.textContent||'';
                const low = text.toLowerCase();
                const isNearby = nearbyFull.some(n=>low.includes(n.toLowerCase()))
                              || nearby.some(c=>{const cl=c.toLowerCase();return low.includes(' '+cl+' ')||low.includes(' '+cl+',')||low.includes('('+cl+')')})
                              || (st && low.includes(st.toLowerCase()));
                return{text,link,pubDate,isNearby};
            });
            setMaxVTweets(tweets);
        }catch(e){
            setMaxVError(e.message||'Feed unavailable');
        }finally{
            setMaxVLoading(false);
        }
    }

    async function fetchRadar(){
        try{
            const r=await fetch('https://api.rainviewer.com/public/weather-maps.json');
            const data=await r.json();
            const past=(data?.radar?.past||[]).map(f=>({...f,type:'past'}));
            const nowcast=(data?.radar?.nowcast||[]).map(f=>({...f,type:'future'}));
            const frames=[...past,...nowcast];
            setRadarFrames(frames);
            setRadarIdx(past.length-1);
        }catch(e){console.error(e);}
    }

    function switchTab(t){
        setPrevTab(tab);
        setTab(t);
    }

    const lvl = LEVEL_CFG[alertLevel]||LEVEL_CFG.clear;

    return(
        <div style={{position:'fixed',inset:0,fontFamily:"'Plus Jakarta Sans',-apple-system,sans-serif",pointerEvents:'none'}}>
            <MapLayer loc={loc} alerts={alerts} radarFrames={radarFrames} radarIdx={radarIdx} mapStyle={mapStyle}/>

            {/* Map overlays — always visible, pointerEvents managed per child */}
            <div style={{position:'fixed',inset:0,zIndex:20,pointerEvents:'none',display:'flex',flexDirection:'column'}}>
                <MapOverlayUI
                    loc={loc} locName={locName}
                    conditions={conditions} alerts={alerts} alertLevel={alertLevel} lvl={lvl}
                    radarFrames={radarFrames} radarIdx={radarIdx} setRadarIdx={setRadarIdx}
                    time={time} mapStyle={mapStyle} setMapStyle={setMapStyle}
                    onOpenSettings={()=>setShowSettings(true)}
                    radarPlaying={radarPlaying} setRadarPlaying={setRadarPlaying}
                    refreshPulse={refreshPulse} lastUpdated={lastUpdated}
                    darkMode={darkMode} setDarkMode={setDarkMode}
                    tab={tab} setTab={switchTab}
                />
            </div>

            {/* Bottom sheets — always rendered for smooth transitions */}
            <Sheet open={tab==='alerts'}>
                <AlertsTab alerts={alerts} alertLevel={alertLevel} lvl={lvl} locName={locName}/>
            </Sheet>
            <Sheet open={tab==='chase'}>
                <ChaseTab chaseDay={chaseDay} hourly={hourly} conditions={conditions}/>
            </Sheet>
            <Sheet open={tab==='feed'}>
                <FeedTab loc={loc} locName={locName} tweets={maxVTweets} loading={maxVLoading} error={maxVError} onRefresh={()=>fetchMaxVelocityFeed(loc,locName)}/>
            </Sheet>
            <Sheet open={tab==='more'}>
                <MoreTab loc={loc}/>
            </Sheet>

            {showSettings && (
                <SettingsModal settings={settings} setSettings={setSettings} onClose={()=>setShowSettings(false)}/>
            )}
        </div>
    );
}

// ─────────────────────────────────────────────
// MAP LAYER (Leaflet — always in DOM)
// ─────────────────────────────────────────────
function MapLayer({loc,alerts,radarFrames,radarIdx,mapStyle}){
    const mapRef       = useRef(null);
    const radarLayerRef= useRef(null);
    const alertLayersRef=useRef([]);
    const markerRef    = useRef(null);
    const radiusRef    = useRef(null);
    const streetLayerRef = useRef(null);
    const satLayerRef    = useRef(null);

    useEffect(()=>{
        if(mapRef.current)return;
        const map=L.map('map',{center:[loc.lat,loc.lon],zoom:7,zoomControl:false,attributionControl:true});
        const street = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            {attribution:'© OpenStreetMap © CARTO',maxZoom:19});
        const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            {attribution:'© Esri',maxZoom:19});
        street.addTo(map);
        streetLayerRef.current = street;
        satLayerRef.current    = sat;
        mapRef.current=map;
        window._leafletMap=map;
    },[]);

    // Switch base layer on mapStyle change
    useEffect(()=>{
        const map=mapRef.current;
        if(!map||!streetLayerRef.current||!satLayerRef.current)return;
        if(mapStyle==='satellite'){
            map.removeLayer(streetLayerRef.current);
            satLayerRef.current.addTo(map);
            // Satellite tile pane needs less hue shift
            document.querySelector('.leaflet-tile-pane').style.filter='brightness(.85) saturate(.9)';
        } else {
            map.removeLayer(satLayerRef.current);
            streetLayerRef.current.addTo(map);
            document.querySelector('.leaflet-tile-pane').style.filter='brightness(.72) saturate(1.3) hue-rotate(198deg)';
        }
        // Re-add radar on top
        if(radarLayerRef.current){ map.removeLayer(radarLayerRef.current); radarLayerRef.current.addTo(map); }
    },[mapStyle]);

    // User dot
    useEffect(()=>{
        const map=mapRef.current;if(!map)return;
        if(markerRef.current)map.removeLayer(markerRef.current);
        if(radiusRef.current)map.removeLayer(radiusRef.current);
        const icon=L.divIcon({
            html:`<div style="position:relative;width:26px;height:26px;">
                <div style="position:absolute;inset:0;background:rgba(77,148,255,.22);border-radius:50%;animation:pulseRing 2.2s ease-out infinite;"></div>
                <div style="position:absolute;top:6px;left:6px;width:14px;height:14px;background:#4d94ff;border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 18px rgba(77,148,255,1),0 0 6px rgba(77,148,255,.8);"></div>
            </div>`,
            iconSize:[26,26],iconAnchor:[13,13],className:''
        });
        markerRef.current=L.marker([loc.lat,loc.lon],{icon}).addTo(map);
        radiusRef.current=L.circle([loc.lat,loc.lon],{
            radius:200*1609.34,color:'rgba(77,148,255,.25)',weight:1.2,fillOpacity:.015,dashArray:'5,9'
        }).addTo(map);
        map.flyTo([loc.lat,loc.lon],7,{duration:1.6});
    },[loc]);

    // Radar layer
    useEffect(()=>{
        const map=mapRef.current;if(!map||!radarFrames.length)return;
        if(radarLayerRef.current)map.removeLayer(radarLayerRef.current);
        const frame=radarFrames[radarIdx];if(!frame)return;
        const url=`https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/4/1_1.png`;
        radarLayerRef.current=L.tileLayer(url,{opacity:.72,zIndex:500});
        radarLayerRef.current.addTo(map);
    },[radarFrames,radarIdx]);

    // Alert polygons
    useEffect(()=>{
        const map=mapRef.current;if(!map)return;
        alertLayersRef.current.forEach(l=>map.removeLayer(l));
        alertLayersRef.current=[];
        alerts.forEach(a=>{
            if(!a.geometry||(a.geometry.type!=='Polygon'&&a.geometry.type!=='MultiPolygon'))return;
            const col=ALERT_COLOR[a.event]||'#888';
            const lyr=L.geoJSON({type:'Feature',geometry:a.geometry},{
                style:{color:col,weight:2.5,fillOpacity:.18,fillColor:col}
            });
            lyr.bindPopup(`<b>${a.event}</b><br>${a.area}<br><small style="color:#8896b8">${a.dist} mi ${a.dir} of you</small>`);
            lyr.addTo(map);
            alertLayersRef.current.push(lyr);
        });
    },[alerts]);

    return null;
}

        if(!radarPlaying||!radarFrames.length)return;
        const t=setInterval(()=>setRadarIdx(i=>(i+1)%radarFrames.length),600);
        return()=>clearInterval(t);
    },[radarPlaying,radarFrames.length]);

    // Apply light/dark map tile filter
    useEffect(()=>{
        const pane=document.querySelector('.leaflet-tile-pane');
        if(!pane)return;
        if(mapStyle==='satellite'){
            pane.style.filter=darkMode?'brightness(.85) saturate(.9)':'brightness(1) saturate(1)';
        } else {
            pane.style.filter=darkMode?'brightness(.72) saturate(1.3) hue-rotate(198deg)':'brightness(.9) saturate(1.1) hue-rotate(180deg)';
        }
        document.body.style.background=darkMode?'#04091a':'#0e1f40';

        if(window._leafletMap) window._leafletMap.flyTo([loc.lat,loc.lon],9,{duration:1.2});

            rgba(77,148,255,.8) 0%,
            rgba(77,148,255,.8) ${nowPct}%,

                <div>
                    <div style={{fontSize:15,fontWeight:900,color:'#fff',letterSpacing:.3}}>STORM CHASE HQ</div>
                    <div style={{display:'flex',alignItems:'center',gap:5,marginTop:1}}>
                        {/* Refresh pulse dot */}
                        <span style={{
                            width:6,height:6,borderRadius:'50%',
                            background: refreshPulse ? '#4d94ff' : '#30d158',
                            boxShadow: refreshPulse ? '0 0 10px #4d94ff' : '0 0 8px #30d158',
                            flexShrink:0,display:'inline-block',

                    <span style={{fontSize:9,color:'rgba(255,149,0,.5)',fontWeight:700,textTransform:'uppercase',letterSpacing:.8}}>Forecast</span>

function TwitterEmbed(){
    const ref=useRef(null);
    useEffect(()=>{
        if(!ref.current)return;
        const a=document.createElement('a');
        a.className='twitter-timeline';
        a.setAttribute('data-theme','dark');
        a.setAttribute('data-height','420');
        a.setAttribute('data-dnt','true');
        a.href='https://twitter.com/MaxVelocityWX';
        a.textContent='Tweets by MaxVelocityWX';
        ref.current.appendChild(a);
        if(window.twttr?.widgets){window.twttr.widgets.load(ref.current);}
        else{
            const s=document.createElement('script');
            s.src='https://platform.twitter.com/widgets.js';
            s.async=true;
            document.body.appendChild(s);
        }
    },[]);
    return <div ref={ref}/>;
}

// ─────────────────────────────────────────────
function SettingsModal({settings,setSettings,onClose}){
    const [notifStatus,setNotifStatus] = useState(()=>typeof Notification!=='undefined'?Notification.permission:'unsupported');
    const ALL_TYPES=['Tornado Emergency','Tornado Warning','Tornado Watch','Severe Thunderstorm Warning','Severe Thunderstorm Watch'];

    function update(key,val){ setSettings(s=>({...s,[key]:val})); }

    function toggleType(t){
        setSettings(s=>{
            const has=s.alertTypes.includes(t);
            return{...s,alertTypes:has?s.alertTypes.filter(x=>x!==t):[...s.alertTypes,t]};
        });
    }

    async function requestNotif(){
        if(typeof Notification==='undefined'){setNotifStatus('unsupported');return;}
        const perm=await Notification.requestPermission();
        setNotifStatus(perm);
        if(perm==='granted') update('notificationsEnabled',true);
    }

    const typeColors={'Tornado Emergency':'#bf5af2','Tornado Warning':'#ff3d3d','Tornado Watch':'#ff9500',
        'Severe Thunderstorm Warning':'#ffd60a','Severe Thunderstorm Watch':'#a8e063'};

    return(
        <div onClick={onClose} style={{
            position:'fixed',inset:0,zIndex:500,
            background:'rgba(0,0,0,.65)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',
            display:'flex',alignItems:'flex-end',justifyContent:'center',
            animation:'fadeIn .15s ease',pointerEvents:'all'
        }}>
            <div onClick={e=>e.stopPropagation()} style={{
                width:'100%',maxWidth:540,
                background:'#070e24',
                border:'1px solid rgba(100,148,255,.15)',
                borderRadius:'24px 24px 0 0',
                padding:'0 20px 40px',
                boxShadow:'0 -8px 48px rgba(0,0,0,.6)',
                animation:'slideUp .25s cubic-bezier(.4,0,.2,1)'
            }}>
                {/* Handle */}
                <div style={{width:36,height:4,background:'#2d3d60',borderRadius:2,margin:'14px auto 20px'}}/>
                <div style={{fontSize:13,fontWeight:800,color:'#fff',letterSpacing:1.8,textTransform:'uppercase',marginBottom:22}}>Alert Settings</div>

                {/* Notifications */}
                <Row label="Browser Notifications" sub="Alerts even when tab is in background">
                    <Toggle checked={settings.notificationsEnabled} onChange={v=>update('notificationsEnabled',v)}/>
                </Row>
                <button onClick={requestNotif} style={{
                    width:'100%',padding:'11px',
                    background:'rgba(77,148,255,.07)',border:'1px solid rgba(77,148,255,.2)',
                    color:'#4d94ff',borderRadius:12,fontSize:13,fontWeight:600,
                    cursor:'pointer',fontFamily:'inherit',marginBottom:4
                }}>
                    {notifStatus==='granted'?'✓ Notifications Enabled':notifStatus==='denied'?'Blocked in browser settings':'Enable Browser Notifications'}
                </button>
                <div style={{fontSize:11,color:'#3a4a6a',textAlign:'center',marginBottom:18}}>
                    {notifStatus==='granted'?'Permission granted':notifStatus==='denied'?'Allow in browser settings to enable':'Permission: not yet requested'}
                </div>

                {/* Sound */}
                <Row label="Sound Alerts" sub="Audio alarm when new alerts are detected">
                    <Toggle checked={settings.soundEnabled} onChange={v=>update('soundEnabled',v)}/>
                </Row>

                {/* Alert types */}
                <div style={{fontSize:13,fontWeight:600,color:'#e8eef8',marginTop:6,marginBottom:8}}>Notify me for</div>
                {ALL_TYPES.map(t=>(
                    <div key={t} onClick={()=>toggleType(t)} style={{
                        display:'flex',alignItems:'center',gap:12,padding:'9px 0',cursor:'pointer',
                        borderBottom:'1px solid rgba(255,255,255,.04)'
                    }}>
                        <div style={{
                            width:22,height:22,borderRadius:7,flexShrink:0,
                            background:settings.alertTypes.includes(t)?'rgba(77,148,255,.2)':'transparent',
                            border:settings.alertTypes.includes(t)?'1.5px solid #4d94ff':'1.5px solid #2d3d60',
                            display:'flex',alignItems:'center',justifyContent:'center',
                            color:'#4d94ff',fontSize:13,transition:'all .15s'
                        }}>{settings.alertTypes.includes(t)?'✓':''}</div>
                        <span style={{fontSize:13,fontWeight:600,color:typeColors[t]||'#e8eef8'}}>{t}</span>
                    </div>
                ))}

                {/* Radius */}
                <div style={{marginTop:18}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                        <div>
                            <div style={{fontSize:13,fontWeight:600,color:'#e8eef8'}}>Alert Radius</div>
                            <div style={{fontSize:11,color:'#3a4a6a',marginTop:2}}>Only alert within this distance</div>
                        </div>
                        <span style={{fontSize:16,fontWeight:800,color:'#4d94ff'}}>{settings.alertRadius} mi</span>
                    </div>
                    <input type="range" min={25} max={300} step={25}
                        value={settings.alertRadius}
                        onChange={e=>update('alertRadius',+e.target.value)}
                        style={{width:'100%'}}
                    />
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#2d3d60',fontWeight:700,marginTop:4}}>
                        <span>25 mi</span><span>300 mi</span>
                    </div>
                </div>
            </div>
        </div>
    );
}

function Row({label,sub,children}){
    return(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
            <div>
                <div style={{fontSize:13,fontWeight:600,color:'#e8eef8'}}>{label}</div>
                {sub&&<div style={{fontSize:11,color:'#3a4a6a',marginTop:2}}>{sub}</div>}
            </div>
            {children}
        </div>
    );
}

function Toggle({checked,onChange}){
    return(
        <div onClick={()=>onChange(!checked)} style={{
            width:46,height:27,borderRadius:14,flexShrink:0,cursor:'pointer',position:'relative',
            background:checked?'#4d94ff':'#2d3d60',
            transition:'background .2s',
            boxShadow:checked?'0 0 12px rgba(77,148,255,.5)':'none'
        }}>
            <div style={{
                position:'absolute',top:3,left:checked?22:3,
                width:21,height:21,borderRadius:'50%',background:'#fff',
                transition:'left .2s',boxShadow:'0 1px 4px rgba(0,0,0,.3)'
            }}/>
        </div>
    );
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
